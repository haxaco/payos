# Nixpacks configuration for Sly monorepo
# This builds the API from the root of the monorepo

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
  "corepack enable",
  "corepack prepare pnpm@9.14.2 --activate",
  "NODE_ENV=development pnpm install --frozen-lockfile"
]

[phases.build]
cmds = [
  "pnpm --filter @sly/types build",
  "pnpm --filter @sly/utils build",
  "pnpm --filter @sly_ai/sdk build",
  "pnpm --filter @sly_ai/mcp-server build",
  "pnpm --filter @sly/api build"
]

[start]
cmd = "NODE_ENV=production node apps/api/dist/index.js"

[variables]
NODE_ENV = "production"

