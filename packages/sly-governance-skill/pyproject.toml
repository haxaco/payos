[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sly-governance"
version = "0.1.0"
description = "OpenClaw governance skill — route agent contracting through Sly's policy engine"
readme = "SKILL.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [
    { name = "Sly", email = "dev@sly.ai" },
]
keywords = ["openclaw", "clawhub", "governance", "agent", "moltbook", "sly"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.27,<1.0",
    "pydantic>=2.5,<3.0",
]

[project.urls]
Homepage = "https://sly.ai"
Documentation = "https://docs.sly.ai/skills/governance"
Repository = "https://github.com/sly-ai/sly-governance"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[tool.setuptools.packages.find]
include = ["sly_governance*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
