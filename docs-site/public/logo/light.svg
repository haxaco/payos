<?xml version="1.0" encoding="UTF-8"?>
<!--
  Public docs navbar logo — light theme.

  The mark is the canonical brand PNG (docs/logos/sly-mark.png, copied to
  /logo/mark.png) embedded via <image> so we keep the real arrowhead shapes
  rather than approximating them in vector. The "Sly" wordmark is rendered
  as SVG text so its fill can flip per theme (dark.svg is the same geometry
  with fill="#F8FAFC"). viewBox is tight to the visible content so Mintlify
  renders it at full navbar height with no empty padding.

  Aspect roughly matches docs/logos/Sly logo.png (1908×902 ≈ 2.1:1).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 95">
  <!-- Brand mark: chunky blue arrows forming an S. Source: /logo/mark.png (248×412). -->
  <image href="/logo/mark.png" x="0" y="0" width="57" height="95" preserveAspectRatio="xMidYMid meet"/>
  <!-- Wordmark — dark navy on light backgrounds. dark.svg flips to #F8FAFC. -->
  <text x="72" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#0F172A">Sly</text>
</svg>
