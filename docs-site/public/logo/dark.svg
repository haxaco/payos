<?xml version="1.0" encoding="UTF-8"?>
<!--
  Public docs navbar logo — dark theme.

  Identical geometry to light.svg. The mark is the same brand PNG (it's the
  blue arrows on transparent background — same against any backdrop). Only
  the wordmark fill changes: slate-50 instead of slate-900 so it stays
  legible on dark backgrounds.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 95">
  <image href="/logo/mark.png" x="0" y="0" width="57" height="95" preserveAspectRatio="xMidYMid meet"/>
  <text x="72" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="#F8FAFC">Sly</text>
</svg>
