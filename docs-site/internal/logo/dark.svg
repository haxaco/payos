<?xml version="1.0" encoding="UTF-8"?>
<!--
  Internal docs navbar logo — dark theme.

  Identical geometry to light.svg. Wordmark + tagline fills flip for
  dark-mode contrast; the mark PNG stays the same (its blue tone has good
  contrast on both light and dark backgrounds).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 100">
  <image href="/logo/mark.png" x="0" y="0" width="55" height="95" preserveAspectRatio="xMidYMid meet"/>
  <text x="70" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="50" font-weight="700" fill="#F8FAFC">Sly</text>
  <text x="70" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#94A3B8" letter-spacing="2">INTERNAL</text>
</svg>
