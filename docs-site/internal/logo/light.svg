<?xml version="1.0" encoding="UTF-8"?>
<!--
  Internal docs navbar logo — light theme.

  Same canonical brand mark as the public portal, paired with the "Sly"
  wordmark and an "INTERNAL" tagline so internal-portal pages are visually
  distinguishable from the public docs at a glance. dark.svg has identical
  geometry; only fills flip for theme contrast.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 100">
  <image href="/logo/mark.png" x="0" y="0" width="55" height="95" preserveAspectRatio="xMidYMid meet"/>
  <text x="70" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="50" font-weight="700" fill="#0F172A">Sly</text>
  <text x="70" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#475569" letter-spacing="2">INTERNAL</text>
</svg>
